<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento via Pix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card p-4 shadow-sm" style="max-width: 480px; width: 100%;">
        <h5>Pagamento via PIX</h5>
        <p>Clique no botão para copiar o código e pague no app do seu banco.</p>

        <div id="loading" class="text-muted small mb-2">⏳ Gerando código Pix...</div>

        <div class="input-group mb-3">
            <input type="text" id="pixCode" class="form-control" readonly value="">
            <button class="btn btn-primary" type="button" onclick="copyToClipboard()">
                Copiar Código
            </button>
        </div>
        <div id="status" class="text-success small"></div>
    </div>

    <script>
        async function gerarPix() {
            try {
                const response = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        valor: '10.00',             // ← altere o valor aqui
                        descricao: 'Pagamento Online'
                    })
                });

                const data = await response.json();

                document.getElementById("loading").style.display = "none";

                if (data.copyAndPaste) {
                    document.getElementById("pixCode").value = data.copyAndPaste;
                } else {
                    document.getElementById("pixCode").value = 'Erro ao gerar código';
                    document.getElementById("status").classList.replace("text-success", "text-danger");
                    document.getElementById("status").innerText = "Erro ao gerar o Pix.";
                }
            } catch (err) {
                document.getElementById("loading").innerText = "❌ Falha ao conectar com a API.";
            }
        }

        function copyToClipboard() {
            const copyText = document.getElementById("pixCode");
            if (!copyText.value) return;
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            document.getElementById("status").innerText = "✅ Código copiado com sucesso!";
        }

        gerarPix();
    </script>

</body>
</html>
